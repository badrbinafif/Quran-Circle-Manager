services:
  - type: web
    name: quran-circle-api
    env: node
    region: ohio
    plan: free
    buildCommand: pnpm install && pnpm run build
    startCommand: pnpm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: quran-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
  
  - type: pserv
    name: quran-db
    ipAllowList: []
    plan: free
    region: ohio
    postgresVersion: 15
