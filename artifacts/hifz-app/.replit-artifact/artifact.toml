kind = "web"
previewPath = "/"
title = "نظام إدارة حلقات التحفيظ"
version = "1.0.0"
id = "artifacts/hifz-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20837

[services.development]
run = "pnpm --filter @workspace/hifz-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/hifz-app", "run", "build" ]
publicDir = "artifacts/hifz-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20837"
BASE_PATH = "/"
